<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 问答助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .main-content {
            padding: 24px;
        }

        .model-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .model-selector label {
            font-weight: 500;
            color: #333;
        }

        .model-selector select {
            flex: 1;
            padding: 10px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .model-selector select:hover {
            border-color: #667eea;
        }

        .model-selector select:focus {
            outline: none;
            border-color: #667eea;
        }

        .chat-area {
            min-height: 300px;
            max-height: 400px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            background: #fafafa;
        }

        .message {
            margin-bottom: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 85%;
        }

        .message.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
        }

        .message.assistant {
            background: white;
            border: 1px solid #e0e0e0;
            color: #333;
        }

        .message .role {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .message .content {
            font-size: 14px;
            line-height: 1.6;
        }

        .input-area {
            display: flex;
            gap: 12px;
        }

        .input-area textarea {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            resize: none;
            min-height: 60px;
            transition: border-color 0.3s;
        }

        .input-area textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-area button {
            padding: 14px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #666;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 600px) {
            .container { margin: 10px; border-radius: 12px; }
            .input-area { flex-direction: column; }
            .input-area button { padding: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI 问答助手</h1>
        </div>

        <div class="main-content">
            <div class="model-selector">
                <label for="model-select">选择模型：</label>
                <select id="model-select">
                    <option value="deepseek">DeepSeek (deepseek-v4-flash)</option>
                    <option value="qwen-plus">Qwen Plus</option>
                </select>
            </div>

            <div class="chat-area" id="chat-area">
                <div class="message assistant">
                    <div class="role">AI 助手</div>
                    <div class="content">您好！我是您的 AI 助手，请问有什么可以帮助您的？</div>
                </div>
            </div>

            <div class="input-area">
                <textarea id="question-input" placeholder="请输入您的问题..."></textarea>
                <button id="send-btn">发送</button>
            </div>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chat-area');
        const questionInput = document.getElementById('question-input');
        const sendBtn = document.getElementById('send-btn');
        const modelSelect = document.getElementById('model-select');

        sendBtn.addEventListener('click', sendMessage);
        questionInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        async function sendMessage() {
            const question = questionInput.value.trim();
            if (!question) return;

            const selectedModel = modelSelect.value;

            addMessage('user', '我', question);
            questionInput.value = '';
            sendBtn.disabled = true;

            const typingDiv = addTypingIndicator();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question, model: selectedModel })
                });

                typingDiv.remove();

                if (!response.ok) throw new Error('请求失败');

                const data = await response.json();
                addMessage('assistant', 'AI 助手', data.answer);
            } catch (error) {
                typingDiv.remove();
                addMessage('assistant', 'AI 助手', `抱歉，出现错误：${error.message}`);
            } finally {
                sendBtn.disabled = false;
            }
        }

        function addMessage(role, name, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `<div class="role">${name}</div><div class="content">${escapeHtml(content)}</div>`;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.innerHTML = `<div class="role">AI 助手</div><div class="content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
            chatArea.appendChild(typingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            return typingDiv;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
