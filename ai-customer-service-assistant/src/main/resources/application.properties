spring.application.name=ai-customer-service-assistant

server.port=8080

# ==================== AI Service Configuration ====================
spring.ai.dashscope.api-key=${aliQwen-api}
spring.ai.dashscope.chat.options.model=qwen-plus
spring.ai.dashscope.chat.options.temperature=0.7
spring.ai.dashscope.chat.options.top-p=0.8

# ==================== Embedding Configuration (for RAG) ====================
spring.ai.dashscope.embedding.options.model=text-embedding-v3

# ==================== MySQL Database Configuration ====================
spring.datasource.url=jdbc:mysql://localhost:3306/example_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123456
spring.sql.init.mode=never

# ==================== Redis Configuration ====================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=1000ms
spring.data.redis.connect-timeout=1000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=-1ms

# ==================== MyBatis Configuration ====================
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.csa.assistant.entity

# ==================== Knowledge Base Configuration ====================
customer.service.knowledge-base.size=50
customer.service.similarity-threshold=0.75

# ==================== Logging ====================
logging.level.com.csa.assistant=INFO
logging.level.com.csa.assistant.mapper=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
